openapi: 3.1.0
info:
  title: Pixel Comet Management API
  version: 1.0.0
  description: Management endpoints served by Javalin for operational control and diagnostics, plus the browser WebSocket endpoint.
servers:
  - url: /
    description: Shared Javalin listener serving the management API and websocket upgrade endpoints.
security:
  - authTokenHeader: []
components:
  securitySchemes:
    authTokenHeader:
      type: apiKey
      in: header
      name: X-API-Key
  parameters:
    AuthTokenHeader:
      name: X-API-Key
      in: header
      required: true
      schema:
        type: string
      description: Secure management API token generated out-of-band, for example with `openssl rand -hex 32`.
    RoomMessageHeader:
      name: message
      in: header
      required: false
      schema:
        type: string
      description: Optional message broadcast for room actions.
    SessionTokenHeader:
      name: sso_ticket
      in: header
      required: true
      schema:
        type: string
      description: Player session token used to resolve the active session.
    PhotoIdHeader:
      name: photo_id
      in: header
      required: true
      schema:
        type: string
      description: Photo identifier assigned by the client.
  schemas:
    ErrorResponse:
      type: object
      required: [success, error_code, error_message]
      properties:
        success:
          type: boolean
          const: false
        error_code:
          type: string
        error_message:
          type: string
    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
        data:
          nullable: true
    CurrencyAdjustmentRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: integer
          minimum: 0
        reason:
          type: string
          description: Human-readable audit reason. Defaults to a management API reason when omitted.
        source_ref:
          type: string
          description: Optional caller correlation id.
        notify_player:
          type: boolean
          default: true
          description: Whether the online player should receive an immediate purse update.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Optional string metadata copied into plugin event context.
    CurrencyOperationEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required:
            - movement_id
            - player_id
            - currency_code
            - operation
            - old_balance
            - delta
            - new_balance
            - actor_type
            - source_type
            - reason
            - online_player_updated
            - player_notified
          properties:
            movement_id:
              type: integer
            player_id:
              type: integer
            currency_code:
              type: string
            operation:
              type: string
              enum: [ADD, REMOVE, SET]
            old_balance:
              type: integer
            delta:
              type: integer
            new_balance:
              type: integer
            actor_type:
              type: string
            actor_id:
              type: string
            source_type:
              type: string
            source_ref:
              type: string
            reason:
              type: string
            created_at:
              type: string
            online_player_updated:
              type: boolean
            player_notified:
              type: boolean
    PlayerAlertRequest:
      type: object
      properties:
        title:
          type: string
        message:
          type: string
      required: [message]
    IssueSsoTicketRequest:
      type: object
      required: [player_id]
      properties:
        player_id:
          type: integer
          example: 42
    SsoTicketResponse:
      type: object
      required: [ticket, player_id, expires_at]
      properties:
        ticket:
          type: string
        player_id:
          type: integer
        expires_at:
          type: string
          format: date-time
paths:
  /openapi/spec:
    get:
      summary: Return the OpenAPI specification.
      security: []
      responses:
        '200':
          description: OpenAPI YAML document.
          headers:
            content-type:
              schema:
                type: string
                example: application/yaml
          content:
            application/yaml:
              schema:
                type: string
        '401':
          description: Missing or invalid auth token.
          headers:
            www-authenticate:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /swagger:
    get:
      summary: Render the Swagger UI for the management API.
      security: []
      responses:
        '200':
          description: Swagger UI HTML page.
          headers:
            content-type:
              schema:
                type: string
                example: text/html; charset=utf-8
          content:
            text/html:
              schema:
                type: string
  /status:
    get:
      summary: Return a public server health snapshot.
      description: >-
        Returns uptime, online player count, and active room count. No
        authentication token is required. Intended for health monitoring and
        load-balancer probes.
      security: []
      responses:
        '200':
          description: Server is up and accepting connections.
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: object
                    required: [status, players_online, rooms_active, uptime]
                    properties:
                      status:
                        type: string
                        example: up
                      players_online:
                        type: integer
                        example: 42
                      rooms_active:
                        type: integer
                        example: 17
                      uptime:
                        type: string
                        example: "2d 4h 13m"
  /ws:
    get:
      summary: Upgrade to the browser WebSocket side-channel.
      description: >-
        Browser websocket endpoint hosted by the shared Javalin transport. Clients connect to this
        path on the port configured by COMET_TRANSPORT_WEBSOCKETS_PORT and then send
        JSON messages with a handler field such as authentication, asyncMove, or verifyOffer.
      security: []
      responses:
        '101':
          description: WebSocket protocol upgrade accepted.
        '400':
          description: Request did not perform a valid WebSocket upgrade.
        '500':
          description: Server-side websocket initialisation error.
  /player/{id}/reload:
    get:
      summary: Reload a player's runtime data.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Player data reloaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Invalid player id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid auth token.
          headers:
            www-authenticate:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Player or session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /player/{id}/disconnect:
    get:
      summary: Disconnect an online player.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Player disconnected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Invalid player id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid auth token.
          headers:
            www-authenticate:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Player or session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /player/{id}/alert:
    post:
      summary: Send a management alert to an online player.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlayerAlertRequest'
      responses:
        '200':
          description: Alert delivered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Invalid player id or missing message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid auth token.
          headers:
            www-authenticate:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Player or session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /player/{id}/badge/{badge}:
    get:
      summary: Award a badge to a player.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: badge
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Badge awarded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Invalid player id or badge code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid auth token.
          headers:
            www-authenticate:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rooms/active/all:
    get:
      summary: List all active rooms.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
      responses:
        '200':
          description: Active room list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Missing or invalid auth token.
          headers:
            www-authenticate:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /room/{id}/{action}:
    get:
      summary: Execute an action against an active room.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [alert, dispose, data, delete]
        - $ref: '#/components/parameters/RoomMessageHeader'
      responses:
        '200':
          description: Room action completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Invalid room id, action, or message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid auth token.
          headers:
            www-authenticate:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Room not active.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Action not implemented.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /system/status:
    get:
      summary: Return current server status metrics.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
      responses:
        '200':
          description: Current server status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Missing or invalid auth token.
          headers:
            www-authenticate:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /system/shutdown:
    get:
      summary: Trigger a server shutdown.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
      responses:
        '200':
          description: Shutdown accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Missing or invalid auth token.
          headers:
            www-authenticate:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /system/reload/{type}:
    get:
      summary: Reload a runtime subsystem.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [bans, catalog, navigator, permissions, config, news, items, filter, locale, modpresets]
      responses:
        '200':
          description: Reload completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Invalid reload type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid auth token.
          headers:
            www-authenticate:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /sso/ticket:
    post:
      summary: Issue an SSO ticket for a specific player.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueSsoTicketRequest'
      responses:
        '201':
          description: Ticket issued.
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    $ref: '#/components/schemas/SsoTicketResponse'
        '400':
          description: Invalid or missing player_id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid auth token.
          headers:
            www-authenticate:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: SSO backend unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /camera/purchase:
    get:
      summary: Trigger photo purchase validation.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
        - $ref: '#/components/parameters/SessionTokenHeader'
        - $ref: '#/components/parameters/PhotoIdHeader'
      responses:
        '200':
          description: Photo purchase accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Missing or invalid auth token or session token.
          headers:
            www-authenticate:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Player session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Photo requests are rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Trigger photo purchase validation.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
        - $ref: '#/components/parameters/SessionTokenHeader'
        - $ref: '#/components/parameters/PhotoIdHeader'
      responses:
        '200':
          description: Photo purchase accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Missing or invalid auth token or session token.
          headers:
            www-authenticate:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Player session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Photo requests are rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /currencies:
    get:
      summary: List currency definitions.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
      responses:
        '200':
          description: Currency definitions returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Missing or invalid auth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create or update a currency definition.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, display_name]
              properties:
                code:
                  type: string
                display_name:
                  type: string
                protocol_currency_id:
                  type: integer
                  nullable: true
                visible_in_purse:
                  type: boolean
                enabled:
                  type: boolean
                sort_order:
                  type: integer
                icon_key:
                  type: string
                noun_singular:
                  type: string
                  nullable: true
                noun_plural:
                  type: string
                  nullable: true
                description:
                  type: string
                  nullable: true
                role_policy:
                  type: string
                  enum: [ALL, ALLOW_LIST, DENY_LIST]
      responses:
        '200':
          description: Currency definition persisted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Invalid currency definition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid auth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /currencies/{code}:
    patch:
      summary: Update a currency definition.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [display_name]
              properties:
                display_name:
                  type: string
                protocol_currency_id:
                  type: integer
                  nullable: true
                visible_in_purse:
                  type: boolean
                enabled:
                  type: boolean
                sort_order:
                  type: integer
                icon_key:
                  type: string
                noun_singular:
                  type: string
                  nullable: true
                noun_plural:
                  type: string
                  nullable: true
                description:
                  type: string
                  nullable: true
                role_policy:
                  type: string
                  enum: [ALL, ALLOW_LIST, DENY_LIST]
      responses:
        '200':
          description: Currency definition updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Invalid currency definition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid auth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Soft-disable a currency definition.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Currency disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Invalid currency code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid auth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /currencies/{code}/roles:
    get:
      summary: List role rules for a currency.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Role rules returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Missing or invalid auth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /currencies/{code}/roles/{rank_id}:
    put:
      summary: Create or replace one currency role rule.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
        - name: code
          in: path
          required: true
          schema:
            type: string
        - name: rank_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                can_view:
                  type: boolean
                can_earn:
                  type: boolean
                can_spend:
                  type: boolean
                can_manage:
                  type: boolean
      responses:
        '200':
          description: Role rule persisted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Invalid rank, currency, or credit restriction attempt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid auth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete one currency role rule.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
        - name: code
          in: path
          required: true
          schema:
            type: string
        - name: rank_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Role rule deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Invalid rank id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid auth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /currencies/{code}/aliases:
    get:
      summary: List compatibility aliases for a currency.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Currency aliases returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Missing or invalid auth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create or replace one compatibility alias.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [alias]
              properties:
                alias:
                  type: string
      responses:
        '200':
          description: Currency alias persisted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Missing alias or invalid currency.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid auth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /currencies/{code}/aliases/{alias}:
    delete:
      summary: Delete one compatibility alias.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
        - name: code
          in: path
          required: true
          schema:
            type: string
        - name: alias
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Currency alias deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Missing or invalid auth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /player/{id}/currencies:
    get:
      summary: Return a player's currency balances.
      parameters:
        - $ref: '#/components/parameters/AuthTokenHeader'
